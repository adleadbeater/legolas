claude:
  model: claude-sonnet-4-6
  call1_max_tokens: 600        # Merge/dupe call — short structured output
  call2_max_tokens: 5000       # Assessment call — one block per cluster
  retry_wait_seconds: 10
  max_retries: 2

clustering:
  # Thresholds vary by keyword type — see legolas.py cluster_items() for full logic
  title_phrase_overlap: 1      # Quoted titles: "'The Bear'" matching "'The Bear'"
  multiword_phrase_overlap: 1  # "Blake Lively" matching "Blake Lively"
  single_word_overlap: 3       # Single caps: requires 3 shared words
  cross_type_overlap: 2        # Multi from one + single from other: requires 2
  stopwords_extend:
    - movie
    - film
    - says
    - new
    - first
    - will
    - show
    - series
    - season
    - star
    - confirms
    - reveals
    - personal
    - items
    - going

scoring:
  mw_relevance_min: 6           # Stories below this are never posted
  legolas_pick_min_relevance: 7 # legolas_special requires this or higher
  tag_sa_min: 5000              # Minimum S/A for a tag to validate proven_topic
  tag_fr_max: 25                # Maximum failure rate % for proven_topic tags
  article_cache_hours: 6        # How long to retain articles for cross-run clustering
  recently_posted_hours: 24     # Suppress reposts of same event within this window
  lookback_minutes: 360         # Fetch articles from last N minutes each run

sheets:
  sheet_id: "1eEeXc_NLLDMxd9TsKqfGunKVrYvX52505dyCs6zjw2I"
  seen_tab_name: Seen
  tag_tab_names: [Tag, Tags, tag, tags]
  feedback_log_tab: Feedback Log

slack:
  channel_id: C0AM6GMA7U6
  post_enabled: true

publisher_groups:
  # Publications that count as one source for trending threshold purposes
  "Hollywood Reporter": THR
  "THR TV": THR
  "NYT Arts": NYT
  "The Guardian Film": Guardian
  "The Guardian TV": Guardian

corporate_half_weight:
  # Outlets owned by the same corporate parent count as 0.5 each toward the
  # trending source threshold — so one company publishing the same story across
  # its mastheads can't manufacture a "Big Trend" on its own. Genuine broad
  # coverage (multiple independent companies) still trends normally.
  PMC:            # Penske Media / PMRC
    - Deadline
    - Variety
    - Hollywood Reporter
    - THR TV
    - Rolling Stone

perennials:
  sheet_id: "1LUueEeMbEPPCIjZYXul57I3FzYZ-OCISUB8-cv_RpX0"
  perennials_tab: "Perennials Performance Tracking"
  new_release_tab: "New Release Performance Tracking"
  data_start_row: 7          # first data row (1-indexed)
  boost_perennial: 1         # MW_RELEVANCE bump for perennial topic match
  boost_new_release: 1       # MW_RELEVANCE bump for new release (wider window)
  boost_new_release_hot: 2   # MW_RELEVANCE bump for new release ±3 days of release
  hot_window_days: 3         # days before/after release date for the +2 boost
  release_window_before: 14  # days before release date to activate
  release_window_after: 42   # days after release date to keep active
  gnews_lookback: "2h"       # Google News search window
  # Topic types that are too broad for Google News RSS search
  # (fine for relevance boost, but "Thriller" or "Netflix" as a search = noise)
  skip_search_types:
    - Genre
    - Service
    - Other

tag_stopword_blocklist:
  # Common English words that also appear as MW sheet tags. Rejected as priority
  # tags entirely (not even loaded) because substring matching produces false MW
  # Proven Topics — e.g. "it" matched "It's Not TV", "v" matched "England v Ghana",
  # "men" matched "...for Men 2026", "hope" matched "...I Hope...".
  # (Tags of length <= 2 and punctuation-only tags are also auto-rejected in code.)
  - it
  - you
  - your
  - men
  - women
  - man
  - her
  - him
  - his
  - she
  - they
  - hope
  - troy
  - now
  - new
  - one
  - two
  - all
  - out

generic_tag_blocklist:
  # These tags cannot validate proven_topic on their own — too broad
  - netflix
  - streaming
  - hbo max
  - prime video
  - apple tv
  - apple tv+
  - disney+
  - tubi
  - amazon
  - sci-fi
  - thriller
  - anime
  - action
  - adventure
  - fantasy
  - dark
  - mystery
  - western
  - her
  - house
  - doc
  - box office
  - rotten tomatoes
