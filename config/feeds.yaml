# Legolas RSS Feed Configuration
# 51 feeds: 23 Tier 1, 28 Tier 2
# Last verified: June 2026
#
# priority: (optional) authoritativeness rank used as the tiebreak when the same
# story appears across outlets — lower number wins. Defaults when omitted:
# Tier 1 → 2, Tier 2 → 3. The core trades are set to 1 so their headline/URL is
# preferred for a shared story.

